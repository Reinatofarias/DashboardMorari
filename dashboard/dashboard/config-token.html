<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurar Token - PowerBI META</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #070707;
            color: #f6f0db;
            font-family: Arial, sans-serif;
        }
        main {
            width: min(620px, calc(100% - 32px));
            background: #111111;
            border: 1px solid rgba(217, 180, 74, 0.35);
            border-radius: 8px;
            padding: 28px;
        }
        h1 { margin-top: 0; color: #ffd66b; }
        label { display: block; margin-top: 18px; color: #b8a86a; font-weight: 700; }
        input, button {
            width: 100%;
            height: 44px;
            margin-top: 8px;
            border-radius: 8px;
            font: inherit;
        }
        input {
            color: #ffffff;
            background: #1b1b1b;
            border: 1px solid rgba(217, 180, 74, 0.35);
            padding: 0 12px;
        }
        button {
            margin-top: 16px;
            color: #090909;
            background: linear-gradient(135deg, #ffd66b, #d9b44a);
            border: 0;
            cursor: pointer;
            font-weight: 800;
        }
        .box {
            margin-top: 16px;
            padding: 14px;
            border-radius: 8px;
            background: rgba(217, 180, 74, 0.1);
            border: 1px solid rgba(217, 180, 74, 0.25);
        }
        .error { color: #ffe0e0; background: rgba(248, 113, 113, 0.14); border-color: rgba(248, 113, 113, 0.45); }
        .success { color: #dcfce7; background: rgba(52, 211, 153, 0.12); border-color: rgba(52, 211, 153, 0.45); }
        a { color: #ffd66b; }
        code { color: #ffd66b; }
    </style>
</head>
<body>
    <main>
        <h1>Configurar Token</h1>
        <div class="box" id="tokenInfo">Carregando...</div>

        <label for="novoToken">Novo token local</label>
        <input type="text" id="novoToken" placeholder="Cole o token aqui">
        <button type="button" onclick="salvarToken()">Salvar Token</button>

        <div class="box error" id="erro" style="display: none;"></div>
        <div class="box success" id="sucesso" style="display: none;"></div>

        <div class="box">
            No Vercel, configure <code>FB_ACCESS_TOKEN</code> e <code>FB_AD_ACCOUNT_ID</code> nas variaveis de ambiente do projeto.
            Gere tokens no <a href="https://developers.facebook.com/tools/explorer/" target="_blank" rel="noreferrer">Graph API Explorer</a>.
        </div>
    </main>

    <script>
        async function carregarInfo() {
            try {
                const res = await fetch("/api/config");
                const data = await res.json();
                const info = document.getElementById("tokenInfo");

                if (data.configured) {
                    const expiresAt = data.expires_at ? new Date(data.expires_at).toLocaleDateString("pt-BR") : "Nao informado";
                    info.innerHTML = `<strong>Status:</strong> configurado<br><strong>Conta:</strong> ${data.ad_account_id || "--"}<br><strong>Expira em:</strong> ${expiresAt}`;
                } else {
                    info.innerHTML = "<strong>Status:</strong> token ou conta de anuncios nao configurados.";
                }
            } catch (error) {
                document.getElementById("tokenInfo").textContent = "Erro ao carregar: " + error.message;
            }
        }

        async function salvarToken() {
            const token = document.getElementById("novoToken").value.trim();
            const erro = document.getElementById("erro");
            const sucesso = document.getElementById("sucesso");

            erro.style.display = "none";
            sucesso.style.display = "none";

            if (!token) {
                erro.style.display = "block";
                erro.textContent = "Cole um token valido.";
                return;
            }

            try {
                const res = await fetch("/api/salvar-token", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ token })
                });
                const data = await res.json();

                if (data.status !== "success") {
                    throw new Error(data.message || "Erro ao salvar token.");
                }

                sucesso.style.display = "block";
                sucesso.textContent = "Token salvo com sucesso.";
                carregarInfo();
            } catch (error) {
                erro.style.display = "block";
                erro.textContent = error.message;
            }
        }

        carregarInfo();
    </script>
</body>
</html>
